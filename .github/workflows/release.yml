name: Publish Changed Packages

on:
  push:
    branches:
      - 'main'

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changeset file
        id: check
        run: |
          if ls .changeset/*.md > /dev/null 2>&1; then
            echo "hasChangesets=true" >> $GITHUB_OUTPUT
            echo "Changeset found — running workflow."
          else
            echo "hasChangesets=false" >> $GITHUB_OUTPUT
            echo "No changeset found — skipping workflow."
          fi
    outputs:
      hasChangesets: ${{ steps.check.outputs.hasChangesets }}
  release:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.hasChangesets == 'true'
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm release:install

      - name: Build packages
        run: pnpm release:build

      - name: Create release version
        run: pnpm changeset version

      - name: Git commit & push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🚀 version changed packages" || echo "No changes to commit"
          git push origin HEAD:main --follow-tags

      - name: Create .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish packages
        id: publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # 기본 셸이 `bash -eo pipefail` 이므로 if/else 로 exit code 를 안전하게 캡처한다.
          if pnpm release > release.log 2>&1; then code=0; else code=$?; fi
          cat release.log

          # Slack 알림용 로그 캡처
          {
            echo "log<<EOF"
            cat release.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # 실패 판정: changeset publish 의 exit code != 0 또는 로그의 에러 마커
          failed=0
          if [ "$code" -ne 0 ]; then failed=1; fi
          if grep -qiE 'E40[0-9]|ENEEDAUTH|EOTP|npm error|an error occurred while publishing' release.log; then failed=1; fi
          echo "failed=$failed" >> "$GITHUB_OUTPUT"

          if [ "$failed" -eq 1 ]; then
            # 런 상단에 빨간 에러 annotation 표시
            echo "::error title=npm publish 실패::changeset publish 오류 (exit=${code}). Step Summary/로그 확인 — E404 면 NPM_TOKEN 만료·권한 문제."
            # Job Summary 에 결과 + 로그(접기) 노출
            {
              echo "## ❌ npm publish 실패 (exit=${code})"
              echo ""
              echo "\`pnpm changeset publish\` 가 실패했습니다. 버전 bump 커밋은 이미 push 된 상태일 수 있으니, **npm 게시본과 main 참조 버전의 정합성**을 확인하세요."
              echo ""
              echo "<details><summary>release.log 펼치기</summary>"
              echo ""
              echo '```'
              cat release.log
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "> **E404 (PUT)** 는 대개 \`NPM_TOKEN\` 만료/권한 문제입니다. 토큰 갱신 후 재배포하세요. (복구: docs/release-pipeline.md)"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ✅ npm publish 성공" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Slack notification
        if: always()
        run: pnpm release:notify
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          LOG: ${{ steps.publish.outputs.log }}

      # publish 가 실패했으면 Slack 알림까지 보낸 뒤 job 을 실패(빨간불) 처리한다.
      - name: Fail if publish failed
        if: always() && steps.publish.outputs.failed == '1'
        run: |
          echo "::error::npm publish 실패로 릴리스를 실패 처리합니다. 위 Step Summary 와 'Publish packages' 로그를 확인하세요."
          exit 1
